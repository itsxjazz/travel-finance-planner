<nav
  style="display: flex; justify-content: space-between; padding: 15px 20px; background: white; border-bottom: 1px solid #eee; align-items: center;">
  <div style="display: flex; gap: 20px; align-items: center;">
    <span style="font-size: 1.5rem;">✈️</span>
    <a routerLink="/" style="text-decoration: none; color: #333; font-weight: bold;">Início</a>

    @if (isLoggedIn()) {
    <a routerLink="/dashboard" style="text-decoration: none; color: #333;">Minhas Viagens</a>
    <a routerLink="/search" style="text-decoration: none; color: #333;">Buscar Destino</a> <a routerLink="/planner"
      style="text-decoration: none; color: #333;">Planejamento</a>
    }
  </div>

  <div style="display: flex; gap: 20px; align-items: center;">
    @if (!isLoggedIn()) {
    <a routerLink="/login" style="text-decoration: none; color: #333;">Login</a>
    <a routerLink="/register" style="text-decoration: none; color: #333;">Registrar</a>
    } @else {
    <a routerLink="/profile" style="color: var(--text-gray); text-decoration: none; cursor: pointer; transition: 0.3s;"
      onmouseover="this.style.color='var(--primary-neon)'" onmouseout="this.style.color='var(--text-gray)'">
      Olá, <b style="color: var(--text-white);">{{ getUserName() }}</b>
    </a>
    <button (click)="logout()"
      style="background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">
      Sair
    </button>
    }
  </div>
</nav>
