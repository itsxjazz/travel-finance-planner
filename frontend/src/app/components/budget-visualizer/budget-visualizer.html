<div class="visualizer-wrapper"> <div class="chart-container">
    <canvas #budgetChartCanvas></canvas>
  </div>

  <div class="breakdown-list">
    <div class="breakdown-item">
      <span class="label flight">Passagens:</span>
      <strong class="value text-cyan">
        {{ budgetBreakdown.flight | currency:currencyCode }}
      </strong>
    </div>

    <div class="breakdown-item">
      <span class="label hotel">Hospedagem:</span>
      <strong class="value text-cyan">
        {{ budgetBreakdown.hotel | currency:currencyCode }}
      </strong>
    </div>

    <div class="breakdown-item">
      <span class="label daily">Gasto Diário:</span>
      <strong class="value text-cyan">
        {{ budgetBreakdown.dailyExpenses | currency:currencyCode }}
      </strong>
    </div>
  </div>
</div>
