<div class="card-dark visualizer-wrapper">

  <div class="chart-container">
    <canvas #budgetChartCanvas></canvas>
  </div>

  <div class="breakdown-list">
    <div class="breakdown-item">
      <span class="label">Passagens:</span>
      <strong class="value text-cyan">
        {{ budgetBreakdown.flight | currency:currencyCode }}
      </strong>
    </div>

    <div class="breakdown-item">
      <span class="label">Hotel:</span>
      <strong class="value text-purple">
        {{ budgetBreakdown.hotel | currency:currencyCode }}
      </strong>
    </div>

    <div class="breakdown-item">
      <span class="label">Gasto Diário:</span>
      <strong class="value text-pink">
        {{ budgetBreakdown.dailyExpenses | currency:currencyCode }}
      </strong>
    </div>
  </div>
</div>
