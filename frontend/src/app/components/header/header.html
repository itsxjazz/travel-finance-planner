<div class="global-topbar">
  <div class="topbar-brand" routerLink="/">
    <img src="/logo.svg" alt="Logo" class="mini-logo">
    <span class="brand-name">NextDestination</span>
  </div>

  <div class="topbar-right">
    @if (isLoggedIn()) {
      <div class="user-pill">
        <span class="user-greeting">
          Olá, <span class="text-cyan">{{ getUserName() }}</span>
        </span>
      </div>
    }

    <button class="menu-trigger" (click)="toggleMenu()" aria-label="Menu">
      <div class="hamburger-box" [class.open]="isMenuOpen()">
        <span class="line"></span>
        <span class="line"></span>
      </div>
    </button>
  </div>
</div>

<nav class="sidebar-offcanvas" [class.active]="isMenuOpen()">
  <div class="sidebar-bg-logo"></div>

  <div class="sidebar-header">
    <div class="nav-brand">
      <img src="/logo.svg" alt="Logo" class="logo-img">
      <span class="brand-name">NextDestination</span>
    </div>
    <button class="close-sidebar" (click)="closeMenu()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="nav-links">
    @if (isLoggedIn()) {
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Minha Conta
      </a>
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Central de Viagens
      </a>
      <a routerLink="/search" routerLinkActive="active" (click)="closeMenu()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Buscar Destino
      </a>
    }
  </div>

  <div class="nav-actions">
    @if (!isLoggedIn()) {
      <a routerLink="/login" class="link-simples" (click)="closeMenu()">Entrar na conta</a>
      <a routerLink="/register" class="btn-neon-cta" (click)="closeMenu()">CRIAR CONTA</a>
    } @else {
      <button (click)="logout()" class="btn-logout-fintech">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair da Conta
      </button>
    }
  </div>
</nav>

@if (isMenuOpen()) {
  <div class="menu-overlay" (click)="closeMenu()"></div>
}
