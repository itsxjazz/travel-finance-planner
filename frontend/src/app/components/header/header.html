<div class="global-topbar">
  <div class="topbar-brand" routerLink="/">
    <div class="fingo-brand-icon"></div>
    <span class="topbar-brand-name"><span class="fin">Fin</span><span class="go">Go.</span></span>
  </div>

  <div class="topbar-right">
    @if (isLoggedIn()) {
      <div class="user-pill">
        <span class="user-greeting">
          Olá, <span class="text-cyan">{{ getUserName() }}</span>
        </span>
      </div>
    }

    <button class="menu-trigger" (click)="toggleMenu()" aria-label="Menu">
  <svg 
    xmlns="http://www.w3.org/2000/svg" 
    width="24" 
    height="24" 
    viewBox="0 0 24 24" 
    fill="none" 
    stroke="currentColor" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    class="menu-icon"
    [class.open]="isMenuOpen()">
    <path d="M3 6h18"/>
    <path d="M3 12h18"/>
    <path d="M3 18h18"/>
  </svg>
</button>

<nav class="sidebar-offcanvas" [class.active]="isMenuOpen()">
  <div class="sidebar-bg-logo"></div>

  <div class="sidebar-header">
    <div class="nav-brand">
      <div class="fingo-brand-icon"></div>
      <span class="brand-name"><span class="fin">Fin</span><span class="go">Go.</span></span>
    </div>
    <button class="close-sidebar" (click)="closeMenu()">×</button>
  </div>

  <div class="nav-links">
    @if (isLoggedIn()) {
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-pen-icon lucide-user-pen"><path d="M11.5 15H7a4 4 0 0 0-4 4v2"/><path d="M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/><circle cx="10" cy="7" r="4"/></svg>        
        Minha Conta
      </a>
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pinned-icon lucide-map-pinned"><path d="M18 8c0 3.613-3.869 7.429-5.393 8.795a1 1 0 0 1-1.214 0C9.87 15.429 6 11.613 6 8a6 6 0 0 1 12 0"/><circle cx="12" cy="8" r="2"/><path d="M8.714 14h-3.71a1 1 0 0 0-.948.683l-2.004 6A1 1 0 0 0 3 22h18a1 1 0 0 0 .948-1.316l-2-6a1 1 0 0 0-.949-.684h-3.712"/></svg>
        Central de viagens
      </a>
      <a routerLink="/search" routerLinkActive="active" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-tickets-plane-icon lucide-tickets-plane"><path d="M10.5 17h1.227a2 2 0 0 0 1.345-.52L18 12"/><path d="m12 13.5 3.794.506"/><path d="m3.173 8.18 11-5a2 2 0 0 1 2.647.993L18.56 8"/><path d="M6 10V8"/><path d="M6 14v1"/><path d="M6 19v2"/><rect x="2" y="8" width="20" height="13" rx="2"/></svg>        Buscar Destino
      </a>
    }
  </div>

  <div class="nav-actions">
    @if (!isLoggedIn()) {
      <a routerLink="/login" class="link-simples" (click)="closeMenu()">Entrar na conta</a>
      <a routerLink="/register" class="btn-neon-cta" (click)="closeMenu()">Criar Conta</a>
    } @else {
      <button (click)="logout()" class="btn-logout-fintech">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-arrow-right-exit-icon lucide-square-arrow-right-exit"><path d="M10 12h11"/><path d="m17 16 4-4-4-4"/><path d="M21 6.344V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1.344"/></svg>
        Sair da Conta
      </button>
    }
  </div>
</nav>

@if (isMenuOpen()) {
  <div class="menu-overlay" (click)="closeMenu()"></div>
}
