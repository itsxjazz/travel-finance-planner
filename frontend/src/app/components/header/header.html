<nav class="navbar">
  <div class="nav-brand" routerLink="/">
    <img src="/logo.svg" alt="NextDestination Logo" class="logo-img">
    <span class="brand-name">NextDestination</span>
  </div>

  <div class="nav-links">
    @if (isLoggedIn()) {
      <a routerLink="/dashboard" routerLinkActive="active">Minhas Viagens</a>
      <a routerLink="/search" routerLinkActive="active">Buscar Destino</a>
    }
  </div>

  <div class="nav-actions">
    @if (!isLoggedIn()) {
      <a routerLink="/login" class="link-simples">Login</a>
      <a routerLink="/register" class="btn-neon">Registrar</a>
    } @else {
      <a routerLink="/profile" class="user-greeting">
        Olá, <span>{{ getUserName() }}</span>
      </a>
      <button (click)="logout()" class="btn-neon btn-danger">
        Sair
      </button>
    }
  </div>
</nav>
