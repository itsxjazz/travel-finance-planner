<div class="estimator-wrapper">

  <div class="estimator-header">
    <div class="text">
      <h3 class="section-title">Gerador de Orçamento Inteligente</h3>
      <p class="subtitle">Nossos motores buscarão valores reais de hotéis e voos via Booking e Kiwi.</p>
    </div>
  </div>

  <div class="estimator-form">
    <div class="form-row iata-row">
      <div class="form-group">
        <label>Origem (IATA)</label>
        <input type="text" [ngModel]="originCode()" (ngModelChange)="originCode.set($event)" placeholder="Ex: GRU"
          maxlength="3" class="neon-input iata-input">
      </div>
      <div class="form-group">
        <label>Destino (IATA)</label>
        <div class="static-value text-cyan">{{ destinationIata() }}</div>
      </div>
    </div>

    <div class="form-row date-row">
      <div class="form-group">
        <label>Ida</label>
        <input type="date" [ngModel]="departureDate()" (ngModelChange)="departureDate.set($event)" class="neon-input">
      </div>
      <div class="form-group">
        <label>Dias</label>
        <input type="number" [ngModel]="tripDays()" (ngModelChange)="tripDays.set($event)" min="1"
          class="neon-input centered no-spin">
      </div>
      <div class="form-group">
        <label>Volta</label>
        <div class="static-value return-date">{{ checkoutDate() | date:'dd/MM' }}</div>
      </div>
    </div>

    <div class="form-row passengers-row">
      <div class="form-group">
        <label>Adultos</label>
        <input type="number" [ngModel]="adultsCount()" (ngModelChange)="adultsCount.set($event)" min="1"
          class="neon-input centered no-spin">
      </div>
      <div class="form-group">
        <label>Classe do Voo</label>
        <select [ngModel]="flightClass()" (ngModelChange)="flightClass.set($event)" class="neon-select">
          <option value="ECONOMY">Econômica</option>
          <option value="PREMIUM_ECONOMY">Econômica Premium</option>
          <option value="BUSINESS">Executiva</option>
          <option value="FIRST">Primeira Classe</option>
        </select>
      </div>
    </div>

    <div class="stars-section">
      <label class="stars-label">Padrão de Hospedagem</label>
      <div class="stars-group">
        <button *ngFor="let star of [1, 2, 3, 4, 5]" (click)="setStars(star)" [class.active]="hotelStars() >= star"
          class="star-btn">
          ★
        </button>
      </div>
    </div>

    <button (click)="requestEstimate()" class="btn-neon w-full">
      Buscar Preços
    </button>
  </div>
</div>
