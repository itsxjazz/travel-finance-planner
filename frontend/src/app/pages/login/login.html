<div class="auth-container">
  <div class="auth-card card-dark">

    <div class="auth-header">
      <div class="brand-icon">
        <img src="/logo.svg" alt="NextDestination Logo">
      </div>
      <h2 class="auth-title">Bem-vindo <span>de volta!</span></h2>
      <p class="auth-subtitle">Acesse seus planos de viagem.</p>
    </div>

    <form #loginForm="ngForm" (submit)="loginForm.valid && handleLogin()" class="auth-form">

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          #emailRef="ngModel"
          required
          email
          placeholder="seu@email.com"
          [class.is-invalid]="emailRef.invalid && emailRef.touched"
          class="form-input">

        @if (emailRef.invalid && emailRef.touched) {
          <small class="error-text">Insira um e-mail válido.</small>
        }
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          #passRef="ngModel"
          required
          minlength="6"
          placeholder="••••••••"
          [class.is-invalid]="passRef.invalid && passRef.touched"
          class="form-input">

        @if (passRef.invalid && passRef.touched) {
          <small class="error-text">A senha deve ter pelo menos 6 caracteres.</small>
        }
      </div>

      @if (errorMessage()) {
        <div class="backend-error">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="btn-neon w-full"
        [disabled]="loginForm.invalid || isLoading()">
        {{ isLoading() ? 'Entrando...' : 'Entrar na conta' }}
      </button>

    </form>

    <div class="auth-footer">
      <span>Ainda não tem conta?</span>
      <a routerLink="/register" class="text-cyan">Cadastre-se</a>
    </div>

  </div>
</div>
